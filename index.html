<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>감자네컷 — SELF STUDIO</title>
    <!-- 구글 폰트: Noto Sans KR 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- QR 코드 생성을 위한 qrcode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* 1. 기본 설정 및 디자인 변수 */
        :root {
            --primary-yellow: #f7e600;
            --btn-hover: #e5d500;
            --text-dark: #333333;
            --bg-gray: #f5f5f5;
        }

        /* 2. 스크롤 없이 꽉 차게 보이도록 반응형 설정 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: '온글잎 박다현체', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            box-sizing: border-box;
        }

        *, *::before, *::after {
            box-sizing: inherit;
        }

        /* 전체 컨테이너를 모바일 화면 비율에 맞춤 */
        #app {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* SPA 전환을 위한 screen 클래스 (opacity + pointer-events 제어) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 공통 UI 요소 */
        h1, h2, h3, p { margin: 0; }
        
        button {
            font-family: inherit;
            border: none;
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active { transform: scale(0.95); }

        /* [시작 화면] */
        #intro-screen {
            background-color: var(--primary-yellow);
            text-align: center;
            cursor: pointer;
        }
        
        #intro-screen h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #222;
        }

        .badge {
            background-color: #ff6b6b;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 30px;
            display: inline-block;
        }

        .intro-decor {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .blink-text {
            margin-top: 40px;
            font-size: 1.2rem;
            color: #555;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* [프레임 선택 화면] */
        #frame-screen {
            background-color: #fff9e6;
            padding: 20px;
        }

        #frame-screen h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .frame-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
        }

        .frame-btn {
            aspect-ratio: 3/4;
            border-radius: 15px;
            border: 4px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .frame-btn.selected {
            border-color: #ff6b6b;
            transform: scale(1.05);
        }

        .btn-primary {
            background-color: #ff6b6b;
            color: white;
            width: 80%;
            max-width: 300px;
        }

        /* [촬영 화면] */
        #camera-screen {
            background-color: #000;
            position: relative;
        }

        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 거울 모드 (좌우 반전) */
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            pointer-events: none;
            z-index: 10;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            color: white;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none;
        }

        .flash {
            position: absolute;
            inset: 0;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .flash.active {
            animation: flashAnim 0.5s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* [결과 화면] */
        #result-screen {
            background-color: #eaeaea;
        }

        .result-container {
            width: 100%;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 최종 렌더링된 이미지를 반응형으로 보여줌 */
        #final-preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .action-panel {
            width: 100%;
            height: 30%;
            background: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .btn-group button {
            flex: 1;
        }

        .btn-save { background-color: var(--primary-yellow); color: #222; }
        .btn-share { background-color: #4CAF50; color: white; }
        .btn-share:disabled { background-color: #cccccc; cursor: not-allowed; }

        .share-info {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #status-text {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            height: 20px;
        }

        #qrcode {
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #qrcode img {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 시작 화면 -->
    <div id="intro-screen" class="screen active" onclick="app.showScreen('frame-screen')">
        <div class="intro-decor">🥔📸🎈</div>
        <div class="badge">어린이날 기념</div>
        <h1>감자네컷</h1>
        <h2>SELF STUDIO</h2>
        <p class="blink-text">화면을 터치해서 시작하세요!</p>
    </div>

    <!-- 2. 프레임 선택 화면 -->
    <div id="frame-screen" class="screen">
        <h2>어떤 배경색으로 할까요?</h2>
        <div class="frame-options">
            <button class="frame-btn selected" style="background-color: #f7e600;" onclick="app.selectFrame('#f7e600', this)">노랑 감자</button>
            <button class="frame-btn" style="background-color: #ffb6c1;" onclick="app.selectFrame('#ffb6c1', this)">분홍 딸기</button>
            <button class="frame-btn" style="background-color: #87ceeb; color: white;" onclick="app.selectFrame('#87ceeb', this)">파랑 하늘</button>
            <button class="frame-btn" style="background-color: #000000; color: white;" onclick="app.selectFrame('#000000', this)">시크 블랙</button>
        </div>
        <button class="btn-primary" onclick="app.initCamera()">사진 찍으러 가기</button>
    </div>

    <!-- 3. 촬영 화면 -->
    <div id="camera-screen" class="screen">
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="camera-overlay">
                <div class="status-bar">
                    <span id="shot-counter">0 / 4</span>
                    <span id="shot-message">준비하세요!</span>
                </div>
            </div>
            <div id="timer" class="timer">3</div>
            <div id="flash" class="flash"></div>
        </div>
    </div>

    <!-- 4. 결과 화면 -->
    <div id="result-screen" class="screen">
        <div class="result-container">
            <img id="final-preview" src="" alt="결과 사진">
        </div>
        <div class="action-panel">
            <div class="btn-group">
                <button class="btn-save" onclick="app.savePhoto()">📥 저장</button>
                <button id="share-btn" class="btn-share" onclick="app.sharePhoto()">🔗 공유</button>
            </div>
            <div class="share-info">
                <p id="status-text">사진을 예쁘게 꾸미는 중이에요...</p>
                <div id="qrcode"></div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * ImgBB API Key 
     * 요청하신 3544b33f84d28189c5380ae1db5709a6 키를 적용했습니다.
     */
    const IMGBB_API_KEY = '3544b33f84d28189c5380ae1db5709a6'; 
    
    const app = {
        state: {
            frameColor: '#f7e600',
            stream: null,
            photos: [],
            finalCanvasDataUrl: null,
            isUploading: false
        },
        elements: {
            video: document.getElementById('video'),
            timer: document.getElementById('timer'),
            flash: document.getElementById('flash'),
            counter: document.getElementById('shot-counter'),
            message: document.getElementById('shot-message'),
            finalPreview: document.getElementById('final-preview'),
            shareBtn: document.getElementById('share-btn'),
            statusText: document.getElementById('status-text'),
            qrcodeContainer: document.getElementById('qrcode')
        },

        // 화면 전환 함수 (SPA)
        showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        },

        // 프레임 배경색 선택
        selectFrame(color, btnElement) {
            this.state.frameColor = color;
            document.querySelectorAll('.frame-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');
        },

        // 카메라 권한 요청 및 비디오 스트림 연결
        async initCamera() {
            this.showScreen('camera-screen');
            try {
                this.state.stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user", // 전면 카메라 우선
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                this.elements.video.srcObject = this.state.stream;
                
                // 비디오 메타데이터가 로드되면 약간의 지연 후 촬영 시작
                this.elements.video.onloadedmetadata = () => {
                    setTimeout(() => this.startShootingSequence(), 1500);
                };
            } catch (err) {
                console.error("Camera error:", err);
                alert("카메라 접근 권한이 필요합니다. 기기의 설정을 확인해주세요.");
                this.showScreen('frame-screen');
            }
        },

        // 비동기 대기(sleep) 함수
        sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        },

        // 4장 연속 촬영 시퀀스
        async startShootingSequence() {
            this.state.photos = [];
            
            for (let i = 1; i <= 4; i++) {
                this.elements.counter.innerText = `${i} / 4`;
                this.elements.message.innerText = "예쁜 포즈를 취하세요! ✨";
                
                // 3초 카운트다운
                for (let count = 3; count > 0; count--) {
                    this.elements.timer.innerText = count;
                    this.elements.timer.style.display = 'block';
                    await this.sleep(1000);
                }
                
                this.elements.timer.style.display = 'none';
                
                // 찰칵! 플래시 이펙트와 동시에 사진 캡처
                this.elements.flash.classList.add('active');
                this.captureFrame();
                
                setTimeout(() => {
                    this.elements.flash.classList.remove('active');
                }, 500);

                if (i < 4) {
                    this.elements.message.innerText = "다음 사진을 준비하세요!";
                    await this.sleep(1500);
                }
            }

            // 모든 촬영 완료 후 정리
            this.stopCamera();
            this.elements.message.innerText = "수고하셨습니다! 🎈";
            await this.sleep(1000);
            
            // 결과 화면으로 넘어가면서 캔버스 렌더링
            this.showScreen('result-screen');
            await this.renderHighRes(); 
        },

        // 현재 비디오 프레임을 캔버스에 4:3 비율로 캡처
        captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = 640; 
            canvas.height = 480;
            const ctx = canvas.getContext('2d');
            
            // 거울 모드(좌우 반전) 적용
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            
            const videoRatio = this.elements.video.videoWidth / this.elements.video.videoHeight;
            const targetRatio = canvas.width / canvas.height;
            let drawWidth = this.elements.video.videoWidth;
            let drawHeight = this.elements.video.videoHeight;
            let offsetX = 0;
            let offsetY = 0;

            // 중앙 크롭 로직
            if (videoRatio > targetRatio) {
                drawWidth = drawHeight * targetRatio;
                offsetX = (this.elements.video.videoWidth - drawWidth) / 2;
            } else {
                drawHeight = drawWidth / targetRatio;
                offsetY = (this.elements.video.videoHeight - drawHeight) / 2;
            }

            ctx.drawImage(
                this.elements.video,
                offsetX, offsetY, drawWidth, drawHeight,
                0, 0, canvas.width, canvas.height
            );
            
            this.state.photos.push(canvas.toDataURL('image/png'));
        },

        // 카메라 스트림 끄기
        stopCamera() {
            if (this.state.stream) {
                this.state.stream.getTracks().forEach(track => track.stop());
                this.state.stream = null;
            }
        },

        // [핵심] 고화질 네컷 캔버스 합성 렌더링
        async renderHighRes() {
            this.elements.statusText.innerText = "고화질 이미지를 준비하는 중이에요...";
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 600;
            const paddingX = 40;
            const paddingY = 40;
            const bottomPadding = 420; // 하단 캐릭터 이미지 및 텍스트 공간 확보
            const gap = 20;
            const photoWidth = canvas.width - (paddingX * 2);
            const photoHeight = (photoWidth * 3) / 4; 
            
            // 캔버스 총 세로 길이 계산
            canvas.height = paddingY + (photoHeight * 4) + (gap * 3) + bottomPadding;

            // 1. 프레임 배경색 칠하기
            ctx.fillStyle = this.state.frameColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 촬영한 4장의 사진 차례대로 얹기
            for (let i = 0; i < this.state.photos.length; i++) {
                const img = new Image();
                img.src = this.state.photos[i];
                await new Promise(resolve => img.onload = resolve);
                
                const x = paddingX;
                const y = paddingY + (i * (photoHeight + gap));
                
                // 사진 테두리 그림자 효과
                ctx.shadowColor = 'rgba(0, 0, 0, 0.1)';
                ctx.shadowBlur = 10;
                ctx.fillRect(x, y, photoWidth, photoHeight); 
                
                ctx.shadowColor = 'transparent';
                ctx.drawImage(img, x, y, photoWidth, photoHeight);
            }

            // 3. 외부 URL을 사용한 '감자반' 캐릭터 이미지 합성
            const logoImg = new Image();
            // CORS 에러 방지를 위해 crossOrigin 속성 추가 (필수)
            logoImg.crossOrigin = "anonymous"; 
            logoImg.src = 'https://i.ibb.co/VWXh9drG/gamjaban.jpg'; 
            
            await new Promise(resolve => {
                logoImg.onload = resolve;
                logoImg.onerror = () => {
                    console.warn("외부 이미지를 불러오는 데 실패했습니다.");
                    logoImg.failed = true;
                    resolve();
                };
            });

            let textStartY = canvas.height - 160;

            if (!logoImg.failed) {
                const imgWidth = 220; 
                const ratio = logoImg.height / logoImg.width;
                const imgHeight = imgWidth * ratio;
                
                // 이미지 중앙 정렬 좌표 계산
                const imgX = (canvas.width - imgWidth) / 2;
                const imgY = paddingY + (photoHeight * 4) + (gap * 3) + 30; 

                // 귀여운 그림자 효과와 함께 그리기
                ctx.save();
                ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 5;
                ctx.drawImage(logoImg, imgX, imgY, imgWidth, imgHeight);
                ctx.restore();

                // 텍스트 시작 위치를 이미지 아래로 조정
                textStartY = imgY + imgHeight + 45; 
            }

            // 4. 디자인 요소 텍스트 추가 (감자네컷, 반 정보, 날짜)
            const isDarkBg = this.state.frameColor === '#000000';
            ctx.fillStyle = isDarkBg ? '#ffffff' : '#333333';
            ctx.textAlign = 'center';

            ctx.font = 'bold 45px "Noto Sans KR", sans-serif';
            ctx.fillText('🥔 감자네컷', canvas.width / 2, textStartY);

            ctx.font = 'bold 22px "Noto Sans KR", sans-serif';
            ctx.fillText('양진초등학교 5학년 1반', canvas.width / 2, textStartY + 40);

            const today = new Date();
            const dateStr = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
            
            ctx.font = '18px "Noto Sans KR", sans-serif';
            ctx.fillStyle = isDarkBg ? '#dddddd' : '#666666';
            ctx.fillText(`어린이날 기념 🎉 | ${dateStr}`, canvas.width / 2, textStartY + 75);

            // [보안 우회] CORS 정책 때문에 로컬(file://) 환경에서 toDataURL 호출 시 에러가 날 수 있음.
            try {
                this.state.finalCanvasDataUrl = canvas.toDataURL('image/png');
                this.elements.finalPreview.src = this.state.finalCanvasDataUrl;
                this.elements.statusText.innerText = "예쁜 네컷 사진이 완성되었어요! 🎈";
            } catch (e) {
                console.error(e);
                alert("브라우저 보안 문제(CORS)로 이미지를 생성할 수 없습니다. 웹 서버(Live Server) 환경에서 실행해주세요.");
            }
        },

        // 내 디바이스에 이미지 다운로드 (저장 버튼)
        savePhoto() {
            if (!this.state.finalCanvasDataUrl) return;
            
            const link = document.createElement('a');
            link.download = `감자네컷_양진초_5학년_1반_${Date.now()}.png`;
            link.href = this.state.finalCanvasDataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        },

        // ImgBB API를 활용한 공유 및 QR코드 생성 (공유 버튼)
        async sharePhoto() {
            if (this.state.isUploading || !this.state.finalCanvasDataUrl) return;

            this.state.isUploading = true;
            this.elements.shareBtn.disabled = true;
            this.elements.shareBtn.innerText = "⏳ 업로드 중...";
            this.elements.statusText.innerText = "서버에 업로드하는 중이에요...";
            this.elements.qrcodeContainer.innerHTML = ''; // QR코드 영역 초기화

            try {
                // Base64 포맷에서 data:image/png;base64, 부분을 제거
                const base64Data = this.state.finalCanvasDataUrl.split(',')[1];
                
                const formData = new FormData();
                formData.append('image', base64Data);
                // API상 특정 폴더 지정은 불가능하여 식별하기 쉽도록 파일명(name)에 Prefix 지정
                formData.append('name', 'four_cut_' + Date.now()); 
                formData.append('expiration', '7200'); // 7200초 = 2시간 유지

                // ImgBB API POST 요청
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const imageUrl = data.data.url;
                    
                    // 성공적으로 업로드 후 URL을 바탕으로 QR 생성
                    new QRCode(this.elements.qrcodeContainer, {
                        text: imageUrl,
                        width: 128,
                        height: 128,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });

                    this.elements.statusText.innerText = "스캔하면 고화질 사진이 열려요! (2시간 유지)";
                    this.elements.shareBtn.innerText = "✅ 공유 완료";
                } else {
                    throw new Error("API 응답 실패");
                }

            } catch (error) {
                console.error("Upload error:", error);
                this.elements.statusText.innerText = "업로드에 실패했어요. 다시 시도해주세요. 😢";
                this.elements.shareBtn.innerText = "🔗 다시 공유";
                this.elements.shareBtn.disabled = false;
            } finally {
                this.state.isUploading = false;
            }
        }
    };
</script>
</body>
</html>
